        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }

        var Filters = {"Desciption": "str"};
        function filterFunc() {
          map.eachLayer(function(lyr){
          if ("options" in lyr && "dataVar" in lyr["options"]){
            features = this[lyr["options"]["dataVar"]].features.slice(0);
            try{
              for (key in Filters){
                keyS = key.replace(/[^a-zA-Z0-9_]/g, "")
                if (Filters[key] == "str" || Filters[key] == "bool"){
                  var selection = [];
                  var options = document.getElementById("sel_" + keyS).options
                  for (var i=0; i < options.length; i++) {
                    if (options[i].selected) selection.push(options[i].value);
                  }
                    try{
                      if (key in features[0].properties){
                        for (i = features.length - 1;
                          i >= 0; --i){
                          if (selection.indexOf(
                          features[i].properties[key])<0
                          && selection.length>0) {
                          features.splice(i,1);
                          }
                        }
                      }
                    } catch(err){
                  }
                }
                if (Filters[key] == "int"){
                  sliderVals =  document.getElementById(
                    "div_" + keyS).noUiSlider.get();
                  try{
                    if (key in features[0].properties){
                    for (i = features.length - 1; i >= 0; --i){
                      if (parseInt(features[i].properties[key])
                          < sliderVals[0]
                          || parseInt(features[i].properties[key])
                          > sliderVals[1]){
                            features.splice(i,1);
                          }
                        }
                      }
                    } catch(err){
                    }
                  }
                if (Filters[key] == "real"){
                  sliderVals =  document.getElementById(
                    "div_" + keyS).noUiSlider.get();
                  try{
                    if (key in features[0].properties){
                    for (i = features.length - 1; i >= 0; --i){
                      if (features[i].properties[key]
                          < sliderVals[0]
                          || features[i].properties[key]
                          > sliderVals[1]){
                            features.splice(i,1);
                          }
                        }
                      }
                    } catch(err){
                    }
                  }
                if (Filters[key] == "date"
                  || Filters[key] == "datetime"
                  || Filters[key] == "time"){
                  try{
                    if (key in features[0].properties){
                      HTMLkey = key.replace(/[&\/\\#,+()$~%.'":*?<>{} ]/g, '');
                      startdate = document.getElementById("dat_" +
                        HTMLkey + "_date1").value.replace(" ", "T");
                      enddate = document.getElementById("dat_" +
                        HTMLkey + "_date2").value.replace(" ", "T");
                      for (i = features.length - 1; i >= 0; --i){
                        if (features[i].properties[key] < startdate
                          || features[i].properties[key] > enddate){
                          features.splice(i,1);
                        }
                      }
                    }
                  } catch(err){
                  }
                }
              }
            } catch(err){
            }
          this[lyr["options"]["layerName"]].clearLayers();
          this[lyr["options"]["layerName"]].addData(features);
        var i = 0;
        layer_PortoNovo_et_environs_1.eachLayer(function(layer) {
            var context = {

            layer.bindTooltip((layer.feature.properties['adm2_name'] !== null?String('<div style="color: #323232; font-size: 12pt; font-weight: bold; font-family: \'Open Sans\', sans-serif;">' + layer.feature.properties['adm2_name']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_PortoNovo_et_environs_1'});

        var i = 0;

            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
          }
          })
        }
            document.getElementById("menu").appendChild(

            var div_Desciption = document.createElement('div');
            div_Desciption.id = "div_Desciption";
            div_Desciption.className= "filterselect";
            document.getElementById("menu").appendChild(div_Desciption);

            sel_Desciption.multiple = true;

            Desciption_options_str  += '<option value="Fin de la randonnée">Fin de la randonnée</option>';
            Desciption_options_str  += '<option value="Histoire des sinistrés d&apos;un naufrage sur le lac Nokoué">Histoire des sinistrés d&apos;un naufrage sur le lac Nokoué</option>';
            Desciption_options_str  += '<option value="Point d&apos;observation des oiseaux migrateurs">Point d&apos;observation des oiseaux migrateurs</option>';
            Desciption_options_str  += '<option value="Point de départ au niveau du pont">Point de départ au niveau du pont</option>';
            Desciption_options_str  += '<option value="Point de regrougement des pêcheurs">Point de regrougement des pêcheurs</option>';
            Desciption_options_str  += '<option value="Représentation de Tê-Agbanlin">Représentation de Tê-Agbanlin</option>';
            Desciption_options_str  += '<option value="Représentation de la Divinité Tohossou">Représentation de la Divinité Tohossou</option>';
            Desciption_options_str  += '<option value="Représentation de la sirène des eaux">Représentation de la sirène des eaux</option>';
            Desciption_options_str  += '<option value="Représentation des lamantins d&apos;Afrique">Représentation des lamantins d&apos;Afrique</option>';
            sel_Desciption.innerHTML = Desciption_options_str;
            div_Desciption.appendChild(sel_Desciption);
            var lab_Desciption = document.createElement('div');
            lab_Desciption.innerHTML = 'Desciption';
            lab_Desciption.className = 'filterlabel';
            div_Desciption.appendChild(lab_Desciption);
            var reset_Desciption = document.createElement('div');
            reset_Desciption.innerHTML = 'clear filter';
            reset_Desciption.className = 'filterlabel';
            reset_Desciption.onclick = function() {
                var options = document.getElementById("sel_Desciption").options;
                for (var i=0; i < options.length; i++) {
                    options[i].selected = false;
                }
                filterFunc();
            };
            div_Desciption.appendChild(reset_Desciption);
        resetLabels([layer_PortoNovo_et_environs_1,layer_PortoNovo_et_environs_cheflieu_2,layer_PortoNovo_3]);
